# optimization-benchmark job: quantization + compilation on the L4.
# Submit via watch_job.sh AFTER the retrain frees the GPU (single L4):
#   TEMPLATE=cloud/vertex_optimize.template.yaml RENDERED=cloud/vertex_optimize.yaml \
#   DISPLAY_NAME=paligemma-optimize \
#   ADAPTER_GCS=gs://mlops-paligemma-west4/models/production \
#   bash cloud/watch_job.sh
workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-8    # 32GB RAM: prune_linear_layers finds the global threshold via a histogram of |w| (O(bins) memory, one layer at a time) instead of pooling all ~3B weights to float32 (~49GB RSS, which forced 64GB). [mem] logs confirm the fit.
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 300
    containerSpec:
      imageUri: ${IMAGE_URI}   # digest-pinned by watch_job.sh
      command: ["/bin/bash", "cloud/run_optimize.sh"]
      env:
        - name: ADAPTER_GCS
          value: "${ADAPTER_GCS}"
        - name: PRUNE_SPARSITIES
          value: "${PRUNE_SPARSITIES}"
        - name: PRUNE_N_BATCHES
          value: "${PRUNE_N_BATCHES}"
        - name: SKIP_BENCHMARK
          value: "${SKIP_BENCHMARK}"
        - name: RUN_FINETUNE
          value: "${RUN_FINETUNE}"
        - name: FINETUNE_SPARSITY
          value: "${FINETUNE_SPARSITY}"
        - name: FINETUNE_STEPS
          value: "${FINETUNE_STEPS}"
        - name: GCP_PROJECT
          value: paligemma-scienceqa
        - name: WANDB_SECRET_NAME
          value: wandb-api-key
        - name: HF_SECRET_NAME
          value: hf-token
serviceAccount: 581237630637-compute@developer.gserviceaccount.com
baseOutputDirectory:
  outputUriPrefix: gs://mlops-paligemma-west4/vertex-output/paligemma-optimize
